<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infiltrado</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #rive-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="rive-canvas"></canvas>

  <script src="https://unpkg.com/@rive-app/webgl2@2.38.3"></script>
  <script>
    const RIVE_SRC = "./main.riv";
    const ARTBOARD = "Artboard";
    const STATE_MACHINE = "State Machine 1";

    const canvas = document.getElementById("rive-canvas");

    const riveInstance = new rive.Rive({
      src: RIVE_SRC,
      canvas,
      artboard: ARTBOARD,
      stateMachines: STATE_MACHINE,
      autoplay: true,
      autoBind: true,

      layout: new rive.Layout({
        fit: rive.Fit.Contain,
        alignment: rive.Alignment.Center,
      }),

      onLoad: () => {
        riveInstance.resizeDrawingSurfaceToCanvas();

        const vm = riveInstance.viewModelInstance;
        console.log("[Rive] carregado");
        console.log("[Rive] View Model vinculado:", vm);

        if (vm) {
          for (const property of vm.properties || []) {
            const name = property?.name;
            if (!name) continue;

            try {
              const list = vm.list(name);
              if (list) {
                console.log(`[Rive] Lista '${name}': ${list.length} item(ns)`);
              }
            } catch (_) {}
          }
        }
      },

      onLoadError: (error) => {
        console.error("[Rive] erro ao carregar:", error);
      },
    });

    window.addEventListener("resize", () => {
      riveInstance.resizeDrawingSurfaceToCanvas();
    });

    window.riveInstance = riveInstance;
  </script>
</body>
</html>
