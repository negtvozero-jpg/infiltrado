<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Infiltrado</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #rive-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>

<body>
  <canvas id="rive-canvas"></canvas>

  <script src="https://unpkg.com/@rive-app/webgl2@2.38.3"></script>

  <script>

    const RIVE_SRC = "./lite/main_lite.riv";
    const ARTBOARD = "Artboard";
    const STATE_MACHINE = "State Machine 1";
    const TARGET_DPR = 1;

    const canvas = document.getElementById("rive-canvas");

    let riveInstance = null;
    let lastCanvasWidth = 0;
    let lastCanvasHeight = 0;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();

      const width = Math.max(
        1,
        Math.round(rect.width * TARGET_DPR)
      );

      const height = Math.max(
        1,
        Math.round(rect.height * TARGET_DPR)
      );

      if (
        width === lastCanvasWidth &&
        height === lastCanvasHeight
      ) {
        return;
      }

      lastCanvasWidth = width;
      lastCanvasHeight = height;

      canvas.width = width;
      canvas.height = height;

      console.log(
        `[Canvas] ${width} × ${height} | DPR usado: ${TARGET_DPR}`
      );
    }

    resizeCanvas();

    riveInstance = new rive.Rive({
      src: RIVE_SRC,
      canvas,

      artboard: ARTBOARD,
      stateMachines: STATE_MACHINE,

      autoplay: true,
      autoBind: true,

      layout: new rive.Layout({
        fit: rive.Fit.Contain,
        alignment: rive.Alignment.Center,
      }),

      onLoad: () => {
        resizeCanvas();

        const vm = riveInstance.viewModelInstance;

        console.log("[Rive] carregado");
        console.log(
          "[Rive] DPR real do aparelho:",
          window.devicePixelRatio || 1
        );
        console.log("[Rive] DPR usado:", TARGET_DPR);
        console.log("[Rive] View Model vinculado:", vm);

        if (!vm) {
          return;
        }

        for (const property of vm.properties || []) {
          const name = property?.name;

          if (!name) {
            continue;
          }

          try {
            const list = vm.list(name);

            if (list) {
              console.log(
                `[Rive] Lista '${name}': ${list.length} item(ns)`
              );
            }
          } catch (_) {

          }
        }
      },

      onLoadError: (error) => {
        console.error(
          "[Rive] Erro ao carregar o arquivo:",
          error
        );
      },
    });

    const resizeObserver = new ResizeObserver(() => {
      resizeCanvas();
    });

    resizeObserver.observe(canvas);

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => {
      requestAnimationFrame(resizeCanvas);
    });

    window.addEventListener("beforeunload", () => {
      resizeObserver.disconnect();

      if (riveInstance) {
        riveInstance.cleanup();
      }
    });

    window.riveInstance = riveInstance;
  </script>
</body>
</html>
